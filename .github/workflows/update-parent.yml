name: Update submodule in neilkanakia.com

on:
  push:
    branches:
      - main

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: neilk17/neilkanakia.com
          token: ${{ secrets.SUBMODULE_PAT }}
          submodules: true

      - name: Update submodule to latest
        run: git submodule update --remote content

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content
          git diff --staged --quiet || git commit -m "chore: update public-writing submodule"
          git push
